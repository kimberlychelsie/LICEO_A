{% extends "base.html" %}
{% block title %}Edit Student Account{% endblock %}
{% block content %}
<style>
    :root {
        --ios-blue: #007aff;
        --ios-gray: #8e8e93;
        --ios-light-gray: #f2f2f7;
    }
    .ios-container { padding: 40px 20px; max-width: 600px; margin: 0 auto; }
    .ios-card { background: #fff; border-radius: 20px; padding: 32px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); border: 1px solid rgba(0, 0, 0, 0.02); }
    .ios-label { font-size: 12px; font-weight: 700; color: #86868b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
    .ios-input { background: var(--ios-light-gray); border: none; border-radius: 12px; padding: 14px 18px; font-size: 16px; width: 100%; color: #1d1d1f; margin-bottom: 20px; }
    .ios-input:focus { background: #fff; box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); outline: none; }
    .ios-btn { padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 16px; border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; width: 100%; margin-top: 10px; }
    .ios-btn-blue { background: var(--ios-blue); color: #fff; }
    .ios-btn-gray { background: #e3e3e8; color: #1d1d1f; }
</style>

<div class="ios-container">
    <div style="margin-bottom: 32px;">
        <h1 style="font-size: 28px; font-weight: 800; margin: 0;">Edit Student</h1>
        <p style="color: var(--ios-gray); margin-top: 4px;">Update details for this student account</p>
    </div>

    <form method="post">
        <div class="ios-card">
            <label class="ios-label">Student Name</label>
            <input class="ios-input" name="full_name" value="{{ student.full_name or '' }}" placeholder="Name" required>
            
            <label class="ios-label">Email Address</label>
            <input class="ios-input" name="email" type="email" value="{{ student.email or '' }}" placeholder="email@example.com" required>

            <label class="ios-label">Gender</label>
            <select class="ios-input" name="gender" required>
                <option value="">— Select —</option>
                <option value="female" {% if student.gender == 'female' %}selected{% endif %}>Female</option>
                <option value="male" {% if student.gender == 'male' %}selected{% endif %}>Male</option>
            </select>

            <label class="ios-label">Current Grade Level</label>
            <input class="ios-input" name="grade_level" value="{{ student.grade_level or '' }}" placeholder="e.g., Grade 10">
        </div>

        <div style="margin-top: 24px; display: flex; flex-direction: column; gap: 12px;">
            <button type="submit" class="ios-btn ios-btn-blue">Save Changes</button>
            <a href="/branch-admin/manage-accounts?role=student" class="ios-btn ios-btn-gray" style="text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
