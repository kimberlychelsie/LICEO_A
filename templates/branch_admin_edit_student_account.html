{% extends "base.html" %}
{% block title %}Edit Student Account – Liceo LMS{% endblock %}

{% block styles %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

    :root {
        --ma-primary: #1e3a8a;
        --ma-accent: #3b82f6;
        --ma-bg: #f8fafc;
        --ma-card: #ffffff;
        --ma-border: #e2e8f0;
        --ma-text: #0f172a;
        --ma-muted: #64748b;
        --ma-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    body {
        background-color: var(--ma-bg);
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .edit-container {
        padding: 60px 24px;
        max-width: 600px;
        margin: 0 auto;
    }

    .edit-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .edit-header h1 {
        font-size: 2rem;
        font-weight: 900;
        color: var(--ma-primary);
        letter-spacing: -0.03em;
        margin-bottom: 8px;
    }

    .edit-header p {
        color: var(--ma-muted);
        font-weight: 600;
        font-size: 1rem;
    }

    .premium-card {
        background: var(--ma-card);
        border: 1px solid var(--ma-border);
        border-radius: 28px;
        padding: 40px;
        box-shadow: var(--ma-shadow);
        position: relative;
        overflow: hidden;
    }

    .premium-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: linear-gradient(90deg, #10b981, #34d399); /* Green for students/growth */
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-group label {
        display: block;
        font-size: 0.75rem;
        font-weight: 850;
        color: var(--ma-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
        margin-left: 4px;
    }

    .form-control {
        width: 100%;
        padding: 16px 20px;
        border-radius: 16px;
        border: 2px solid var(--ma-border);
        font-family: inherit;
        font-weight: 600;
        color: var(--ma-text);
        font-size: 1rem;
        transition: all 0.2s;
        background: #fdfdfd;
        box-sizing: border-box;
    }

    .form-control:focus {
        border-color: #10b981;
        background: #fff;
        outline: none;
        box-shadow: 0 0 0 5px rgba(16, 185, 129, 0.1);
    }

    .btn-submit {
        width: 100%;
        padding: 18px;
        border-radius: 18px;
        border: none;
        background: #059669;
        color: #fff;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        margin-top: 12px;
        box-shadow: 0 4px 6px rgba(5, 150, 105, 0.2);
    }

    .btn-submit:hover {
        background: #047857;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px rgba(5, 150, 105, 0.3);
    }

    .btn-cancel {
        display: block;
        text-align: center;
        margin-top: 24px;
        color: var(--ma-muted);
        text-decoration: none;
        font-weight: 700;
        font-size: 0.9rem;
        transition: color 0.2s;
    }

    .btn-cancel:hover {
        color: #059669;
    }

    .role-badge {
        display: inline-block;
        padding: 6px 14px;
        background: #ecfdf5;
        color: #059669;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 24px;
    }
</style>
{% endblock %}

{% block content %}
<div class="edit-container">
    <div class="edit-header">
        <h1>Student Registry Update</h1>
        <p>Modifying details for <strong>{{ student.full_name }}</strong></p>
    </div>

    <div class="premium-card">
        <div style="text-align: center;">
            <div class="role-badge">Student Domain</div>
        </div>

        <form method="post" action="{{ url_for('branch_admin.branch_admin_edit_student_account', account_id=student.account_id, role=request.args.get('role', 'student')) }}">
            <div class="form-group">
                <label>Legal Name</label>
                <input class="form-control" name="full_name" value="{{ student.full_name or '' }}" placeholder="Enter name" required>
            </div>
            
            <div class="form-group">
                <label>Contact Email</label>
                <input class="form-control" name="email" type="email" value="{{ student.email or '' }}" placeholder="student@example.com" required>
            </div>

            <div class="form-group">
                <label>Gender Identifier</label>
                <select class="form-control" name="gender" required>
                    <option value="">— Select Gender —</option>
                    <option value="female" {% if student.gender == 'female' %}selected{% endif %}>Female</option>
                    <option value="male" {% if student.gender == 'male' %}selected{% endif %}>Male</option>
                </select>
            </div>

            <div class="form-group">
                <label>Current Status/Grade</label>
                <input class="form-control" name="grade_level" value="{{ student.grade_level or '' }}" placeholder="e.g. Grade 10">
            </div>

            <button type="submit" class="btn-submit">Verify & Save Record</button>
        </form>
    </div>

    <a href="{{ url_for('branch_admin.branch_admin_manage_accounts', role=request.args.get('role', 'student')) }}" class="btn-cancel">
        ← Return to Student Registry
    </a>
</div>
{% endblock %}
