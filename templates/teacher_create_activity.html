{% extends "base.html" %}
{% block title %}Create Activity{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <h2 class="card-header">📝 Create New Activity</h2>
    <form action="{{ url_for('teacher.create_activity') }}" method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label class="form-label">Activity Title <span style="color:red">*</span></label>
            <input type="text" name="title" class="form-input" required maxlength="255">
        </div>

        <div class="grid grid-2">
            <div class="form-group">
                <label class="form-label">Section & Subject <span style="color:red">*</span></label>
                <select name="assignment" class="form-select" required>
                    <option value="">-- Select Section & Subject --</option>
                    {% for a in teacher_assignments %}
                    <option value="{{ a.section_id }}_{{ a.subject_id }}">{{ a.grade_level_name }} - {{ a.section_name
                        }} ({{ a.subject_name }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                    <option value="Assignment">Assignment</option>
                    <option value="Project">Project</option>
                    <option value="Activity">Activity</option>
                    <option value="Performance Task">Performance Task</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Instructions / Description</label>
            <textarea name="instructions" class="form-textarea" rows="6"></textarea>
        </div>

        <div class="grid grid-3">
            <div class="form-group">
                <label class="form-label">Max Score <span style="color:red">*</span></label>
                <select name="max_score" class="form-select" required>
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                    <option value="60">60</option>
                    <option value="70">70</option>
                    <option value="80">80</option>
                    <option value="90">90</option>
                    <option value="100" selected>100</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Due Date <span style="color:red">*</span></label>
                <input type="datetime-local" name="due_date" id="due_date" class="form-input" min="{{ min_date }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Status <span style="color:red">*</span></label>
                <select name="status" class="form-select" required>
                    <option value="Published">Published (Visible immediately)</option>
                    <option value="Draft" selected>Draft (Hidden)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">📅 Grading Period <span style="color:red">*</span></label>
            <select name="grading_period" class="form-select" required>
                <option value="">-- Select Grading Period --</option>
                <option value="1st">1st Grading</option>
                <option value="2nd">2nd Grading</option>
                <option value="3rd">3rd Grading</option>
                <option value="4th">4th Grading</option>
            </select>
        </div>


        <div class="form-group">
            <label class="form-label">Allowed File Extensions (comma separated, e.g. pdf, doc, png)</label>
            <input type="text" name="allowed_file_types" class="form-input" placeholder="pdf, jpg, docx">
            <small style="color:var(--muted)">Leave empty for any type.</small>
        </div>

        <div class="form-group">
            <label class="form-label">Reference Attachment (Optional)</label>
            <input type="file" name="attachment" class="form-input" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg">
        </div>

        <hr style="border:0; border-top:1px solid var(--border); margin: 24px 0;">

        <div style="display:flex; justify-content:flex-end; gap:12px;">
            <a href="{{ url_for('teacher.activities') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Create Activity</button>
        </div>
    </form>
</div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {
    });
</script>
{% endblock %}
