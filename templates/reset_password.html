{% extends "base_public.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div style="max-width:520px; margin:40px auto; background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:22px;">
  <h2 style="margin:0 0 6px;">Reset password</h2>
  <p style="margin:0 0 14px; color:#64748b; font-size:0.92rem;">
    Enter your new password.
  </p>

  <form method="post">
    <label style="display:block; font-weight:700; margin-bottom:6px;">New password</label>
    <input
      type="password"
      name="password"
      required
      style="width:100%; padding:10px 12px; border:1.5px solid #e2e8f0; border-radius:10px; margin-bottom:12px;"
    />

    <label style="display:block; font-weight:700; margin-bottom:6px;">Confirm password</label>
    <input
      type="password"
      name="confirm_password"
      required
      style="width:100%; padding:10px 12px; border:1.5px solid #e2e8f0; border-radius:10px; margin-bottom:12px;"
    />

    <button type="submit"
      style="width:100%; padding:10px 12px; border:none; border-radius:10px; background:#16a34a; color:#fff; font-weight:800; cursor:pointer;">
      Set new password
    </button>
  </form>

  <div style="margin-top:12px; text-align:center;">
    <a href="/login" style="color:#1d4ed8; text-decoration:none; font-weight:700;">Back to login</a>
  </div>
</div>
{% endblock %}
