{% extends "base.html" %}
{% block title %}Create Quiz{% endblock %}
{% block content %}
<div style="max-width:700px; margin:0 auto;">
    <div class="card">
        <h2 class="card-header">✏️ Create New Quiz</h2>
        <form action="{{ url_for('teacher.teacher_quiz_create') }}" method="POST">

            <div class="form-group">
                <label class="form-label">Quiz Title <span style="color:red">*</span></label>
                <input type="text" name="title" class="form-input" required maxlength="255" placeholder="e.g. Chapter 3 Quiz">
            </div>

            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label">Subject <span style="color:red">*</span></label>
                    <select name="subject_id" id="subjectSelect" class="form-select" required onchange="updateSectionCheckboxes()">
                        <option value="">— Select Subject —</option>
                        {% set unique_subjects = [] %}
                        {% for a in teacher_assignments %}
                            {% if a.subject_id not in unique_subjects %}
                                <option value="{{ a.subject_id }}">{{ a.subject_name }}</option>
                                {% set _ = unique_subjects.append(a.subject_id) %}
                            {% endif %}
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Assign to Sections <span style="color:red">*</span></label>
                    <div id="sectionsContainer" style="border:1px solid #ddd; border-radius:6px; padding:10px; min-height:80px; max-height:160px; overflow-y:auto; background:#f8f9fa;">
                        <p style="color:#888; font-size:13px; margin:0;">Select a subject first...</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label">Duration <span style="color:red">*</span></label>
                    <select name="duration_mins" class="form-select" required>
                        <option value="10">10 minutes</option>
                        <option value="20">20 minutes</option>
                        <option value="30" selected>30 minutes</option>
                        <option value="45">45 minutes</option>
                        <option value="60">60 minutes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">📅 Grading Period <span style="color:red">*</span></label>
                    <select name="grading_period" class="form-select" required>
                        <option value="">— Select Grading Period —</option>
                        <option value="1st">1st Grading</option>
                        <option value="2nd">2nd Grading</option>
                        <option value="3rd">3rd Grading</option>
                        <option value="4th">4th Grading</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label">Scheduled Start <span style="font-weight:400; color:#888;">(optional)</span></label>
                    <input type="datetime-local" name="scheduled_start" class="form-input" min="{{ min_date }}">
                    <small style="color:var(--muted);">⏰ Auto-closes after duration.</small>
                </div>
                <div class="grid grid-2" style="gap:10px;">
                    <div class="form-group">
                        <label class="form-label">Max Attempts</label>
                        <input type="number" name="max_attempts" class="form-input" value="1" min="1" max="10">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Passing Score (%)</label>
                        <input type="number" name="passing_score" class="form-input" value="75" min="1" max="100">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer; font-weight:600; font-size:0.88rem;">
                    <input type="checkbox" name="randomize" value="1" style="width:16px; height:16px; accent-color:var(--primary);">
                    🔀 Randomize Question Order
                </label>
            </div>

            <div class="form-group">
                <label class="form-label">Quiz Instructions <span style="font-weight:400; color:#888;">(optional)</span></label>
                <textarea name="instructions" class="form-textarea" rows="3" placeholder="e.g. Read each question carefully. No back navigation."></textarea>
            </div>

            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:8px; padding-top:12px; border-top:1px solid var(--border);">
                <a href="{{ url_for('teacher.teacher_quizzes') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" style="background:#7c3aed;">➕ Create &amp; Add Questions →</button>
            </div>
        </form>
    </div>
</div>

<script>
    const assignments = {{ teacher_assignments|tojson }};

    function updateSectionCheckboxes() {
        const subjectId = document.getElementById('subjectSelect').value;
        const container = document.getElementById('sectionsContainer');
        container.innerHTML = '';
        if (!subjectId) {
            container.innerHTML = '<p style="color:#888; font-size:13px; margin:0;">Select a subject first...</p>';
            return;
        }
        const filtered = assignments.filter(a => a.subject_id == subjectId);
        if (filtered.length === 0) {
            container.innerHTML = '<p style="color:#888; font-size:13px; margin:0;">No sections found for this subject.</p>';
            return;
        }
        filtered.forEach(a => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex; align-items:center; gap:8px; margin-bottom:6px;';
            const cb = document.createElement('input');
            cb.type = 'checkbox'; cb.name = 'section_ids'; cb.value = a.section_id; cb.id = 'sec_' + a.section_id;
            const lbl = document.createElement('label');
            lbl.htmlFor = 'sec_' + a.section_id;
            lbl.style.cssText = 'font-size:14px; cursor:pointer; font-weight:400;';
            lbl.textContent = a.grade_level_name + ' — ' + a.section_name;
            div.appendChild(cb); div.appendChild(lbl); container.appendChild(div);
        });
    }

    document.querySelector('form').onsubmit = function(e) {
        const checked = document.querySelectorAll('input[name="section_ids"]:checked');
        if (checked.length === 0) {
            alert('Please select at least one section.');
            e.preventDefault(); return false;
        }
    };
</script>
{% endblock %}
